<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quray</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://use.typekit.net/brb7wgl.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              quray: {
                cta: '#4701A9',
              },
            },
            fontFamily: {
              nav: ['"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
              hero: [
                'Degular',
                'Anton',
                '"Helvetica Neue"',
                'system-ui',
                'sans-serif',
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="mx-auto flex min-h-screen w-full max-w-[1280px] flex-col bg-black antialiased text-white 2xl:max-w-[1440px]"
  >
    <main class="relative flex w-full flex-col">
      <div id="hero-stage" class="relative w-full">

        <!-- ─── Hero: full viewport height, all layers inside ──────────── -->
        <section
          id="hero-section"
          class="relative w-full overflow-visible"
          style="min-height: 100dvh"
          aria-labelledby="hero-heading"
        >
          <!-- z-0 background -->
          <img
            src="assets/images/quray-back.png"
            alt=""
            width="3684"
            height="2304"
            draggable="false"
            class="pointer-events-none absolute inset-0 z-0 h-full w-full select-none object-cover object-top"
            aria-hidden="true"
          />
          <!-- z-1: text sits between background and foreground images -->
          <div
            id="hero-heading-wrap"
            class="pointer-events-none absolute inset-0 z-[1] flex items-center justify-center p-4"
          >
            <h1
              id="hero-heading"
              class="max-w-full text-center text-[clamp(2.25rem,11vw,9rem)] font-black uppercase leading-[0.95] text-white sm:leading-[0.98] xl:text-[144px] xl:leading-[132px]"
              style="font-family: degular-display, degular, 'Helvetica Neue', system-ui, sans-serif; font-weight: 900; font-variation-settings: 'wght' 950; opacity: 0.18; letter-spacing: 8px; -webkit-text-stroke: 0.55px currentColor; text-rendering: geometricPrecision;"
            >
              <span class="block">Touch nothing</span>
              <span class="block">Shape everything</span>
            </h1>
          </div>
          <!-- z-2 device -->
          <img
            src="assets/images/quray-front-1.png"
            alt=""
            width="3684"
            height="2304"
            draggable="false"
            class="hero-layer-device pointer-events-none absolute left-0 top-0 z-[2] h-full w-full select-none object-cover object-top"
          />
          <!-- z-3 hand — same position as all other layers so composition stays aligned -->
          <img
            src="assets/images/quray-front.png"
            alt=""
            width="3684"
            height="2304"
            draggable="false"
            class="hero-layer-hand pointer-events-none absolute left-0 top-0 z-[3] h-full w-full select-none object-cover object-top scale-90 origin-top"
          />
          <!-- z-4: dotted surface at bottom of the second screen -->
          <div
            id="hero-dotted-wrap"
            class="pointer-events-none absolute z-[4] opacity-0 overflow-hidden"
            style="left:calc(50% - 50vw); width:100vw; top:10%; bottom:0; -webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 78%, rgba(0,0,0,0.85) 90%, rgba(0,0,0,0) 100%); mask-image:linear-gradient(to bottom, #000 0%, #000 78%, rgba(0,0,0,0.85) 90%, rgba(0,0,0,0) 100%);"
            aria-hidden="true"
          >
            <div
              id="hero-dotted-surface"
              style="position:absolute; inset:0;"
              aria-hidden="true"
            ></div>
          </div>
          <!-- z-5: reveal — fades in within the pinned scene once images have exited -->
          <div id="hero-reveal" style="position:absolute; top:calc(50% - 28px); left:0; right:0; z-index:5; text-align:center; padding:0 16px;">
            <p id="hero-reveal-text" style="color:#ffffff; font-size:40px; line-height:1.2; margin-bottom:36px; font-family:degular, 'Helvetica Neue', system-ui, sans-serif; font-weight:400; opacity:0; transform:translateY(24px);">
              Play sound in the air. No touch. No buttons.
            </p>
            <a id="hero-reveal-button" href="early-access.html" style="display:inline-flex; align-items:center; justify-content:center; background:#4701A9; color:white; padding:24px 48px; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:24px; font-weight:400; text-transform:uppercase; letter-spacing:0.05em; text-decoration:none; line-height:1; opacity:0; transform:translateY(24px);">
              BE THE FIRST TO TRY
            </a>
          </div>
        </section>

        <!-- ─── Header: floats over hero top, transparent ─────────────────── -->
        <header class="absolute left-0 right-0 top-0 z-50">
          <!-- Content row: max-width column, vertical dividers, left+right rails -->
          <div
            class="flex w-full flex-col border-l border-r border-white/30 lg:h-[88px] lg:min-h-[88px] lg:flex-row"
          >
            <!-- | 40px · logo · 40px | -->
            <div
              class="flex shrink-0 items-center justify-center border-b border-white/30 px-10 py-10 lg:border-b-0 lg:border-r"
            >
              <a href="./" class="block shrink-0" aria-label="Quray home">
                <img
                  src="assets/images/Quray_logo.svg"
                  alt="Quray"
                  class="h-auto w-[128px] max-w-none"
                  width="128"
                />
              </a>
            </div>
            <!-- flexible spacer -->
            <div
              class="hidden min-h-0 min-w-0 flex-1 lg:flex lg:border-r lg:border-white/30"
              aria-hidden="true"
            ></div>
            <!-- | 56px · nav · 56px | -->
            <nav
              class="flex shrink-0 flex-wrap items-center justify-center gap-x-[clamp(2rem,5vw,5rem)] gap-y-4 border-b border-white/30 px-[56px] py-10 font-nav text-[clamp(1rem,2.5vw,1.25rem)] font-normal leading-none text-white sm:gap-x-20 sm:text-[20px] lg:justify-center lg:border-b-0 lg:border-r lg:py-0"
              aria-label="Primary"
            >
              <a href="product.html" class="transition-opacity hover:opacity-70">Product</a>
              <a href="about.html"   class="transition-opacity hover:opacity-70">About</a>
              <a href="contact.html" class="transition-opacity hover:opacity-70">Contact</a>
            </nav>
            <!-- | 40px · button · 40px | -->
            <div
              class="flex shrink-0 items-center justify-center border-b border-white/30 px-10 py-10 lg:border-b-0"
            >
              <a
                href="early-access.html"
                class="inline-flex h-[56px] items-center justify-center whitespace-nowrap bg-quray-cta px-6 text-center font-nav text-[14px] font-normal uppercase tracking-wide text-white"
              >
                Request early access
              </a>
            </div>
          </div>
          <!-- Full-viewport-width bottom rule only -->
          <div
            class="absolute bottom-0 h-px w-screen bg-white/30"
            style="left: calc(50% - 50vw)"
            aria-hidden="true"
          ></div>
        </header>

      </div>

      <!-- Spacer sections for scroll testing -->
      <section class="min-h-screen w-full bg-black" aria-hidden="true"></section>
      <section class="min-h-screen w-full bg-[#050505]" aria-hidden="true"></section>
      <section class="min-h-screen w-full bg-black" aria-hidden="true"></section>
    </main>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      if (!window.gsap || !window.ScrollTrigger) return;
      gsap.registerPlugin(ScrollTrigger);
      
      if (window.Lenis) {
        var lenis = new Lenis({
          duration: 1.15,
          smoothWheel: true
        });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add(function (time) {
          lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);
      }

      var heroSection = document.querySelector('#hero-section');
      var bgImg       = heroSection.querySelector('img');
      var device      = document.querySelector('.hero-layer-device');
      var hand        = document.querySelector('.hero-layer-hand');
      var heading     = document.querySelector('#hero-heading');
      var revealText  = document.querySelector('#hero-reveal-text');
      var revealBtn   = document.querySelector('#hero-reveal-button');
      var dottedWrap  = document.querySelector('#hero-dotted-wrap');
      var dottedHost  = document.querySelector('#hero-dotted-surface');

      [bgImg, device, hand, revealText, revealBtn].forEach(function (el) {
        el.style.willChange = 'transform';
      });

      function createDottedSurface(host) {
        if (!host || !window.THREE) return null;

        var width = host.clientWidth || window.innerWidth;
        var height = host.clientHeight || window.innerHeight;

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(60, width / height, 1, 10000);
        camera.position.set(0, 285, 940);

        var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
        renderer.setSize(width, height);
        renderer.setClearColor(0x000000, 0);
        host.appendChild(renderer.domElement);

        var separation = 165;
        var amountX = 60;
        var amountY = 90;
        var positions = [];
        var colors = [];
        var geometry = new THREE.BufferGeometry();

        for (var ix = 0; ix < amountX; ix++) {
          for (var iy = 0; iy < amountY; iy++) {
            positions.push(
              ix * separation - (amountX * separation) / 2,
              0,
              iy * separation - (amountY * separation) / 2
            );
            colors.push(235 / 255, 235 / 255, 235 / 255);
          }
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        function createRoundedSquareTexture() {
          var size = 64;
          var canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          if (!ctx) return null;

          ctx.clearRect(0, 0, size, size);
          var pad = size * 0.12;
          var w = size - pad * 2;
          var h = size - pad * 2;
          var r = size * 0.18;
          var x = pad;
          var y = pad;

          ctx.fillStyle = 'rgba(255,255,255,1)';
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
          ctx.fill();

          var texture = new THREE.CanvasTexture(canvas);
          texture.needsUpdate = true;
          return texture;
        }

        var dotTexture = createRoundedSquareTexture();

        var material = new THREE.PointsMaterial({
          size: 11.5,
          vertexColors: true,
          transparent: true,
          opacity: 0.85,
          sizeAttenuation: true,
          map: dotTexture || null,
          depthWrite: false
        });

        var points = new THREE.Points(geometry, material);
        points.position.y = -35;
        scene.add(points);

        var count = 0;
        var rafId = 0;
        var isDestroyed = false;

        function animate() {
          if (isDestroyed) return;
          rafId = requestAnimationFrame(animate);

          var positionAttribute = geometry.attributes.position;
          var attr = positionAttribute.array;
          var i = 0;

          for (var x = 0; x < amountX; x++) {
            for (var y = 0; y < amountY; y++) {
              var index = i * 3;
              attr[index + 1] =
                Math.sin((x + count) * 0.3) * 50 +
                Math.sin((y + count) * 0.5) * 50;
              i++;
            }
          }

          positionAttribute.needsUpdate = true;
          renderer.render(scene, camera);
          count += 0.1;
        }

        function onResize() {
          if (!host) return;
          var w = host.clientWidth || window.innerWidth;
          var h = host.clientHeight || window.innerHeight;
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }

        window.addEventListener('resize', onResize);
        animate();

        return {
          destroy: function () {
            isDestroyed = true;
            window.removeEventListener('resize', onResize);
            cancelAnimationFrame(rafId);
            geometry.dispose();
            material.dispose();
            if (dotTexture) dotTexture.dispose();
            renderer.dispose();
            if (host && renderer.domElement && host.contains(renderer.domElement)) {
              host.removeChild(renderer.domElement);
            }
          }
        };
      }

      var dottedSurface = createDottedSurface(dottedHost);
      gsap.set(heading, { transformOrigin: 'center center' });

      /* ── PIN hero-section for 3× viewport of scroll ────────────────────
         Timeline (3 virtual units = 300% scroll distance):
           0   → 1.5  images rush upward and fully exit the viewport
           0   → 1.0  heading fades from dim → full opacity, scales 1 → 0.85
           1.1 → 1.9  reveal appears in two steps: text, then button
           2.3 → 3.0  hold (everything settled, user reads before scrolling on) */
      var tl = gsap.timeline({
        scrollTrigger: {
          trigger: '#hero-section',
          start: 'top top',
          end: '+=240%',
          pin: true,
          pinSpacing: true,
          scrub: 1.5,
          anticipatePin: 1
        }
      });

      /* Images rush upward together — all layers move in sync */
      tl.to(bgImg,  { y: '-115vh', ease: 'none', duration: 1.5 }, 0);
      tl.to(device, { y: '-120vh', ease: 'none', duration: 1.5 }, 0);
      tl.to(hand,   { y: '-115vh', ease: 'none', duration: 1.5 }, 0);

      /* Heading: was dim behind images, resolves to full opacity + slight scale */
      tl.fromTo(heading,
        { opacity: 0.18, scale: 1,    y: 0   },
        { opacity: 1,    scale: 0.85, y: -164, ease: 'none', duration: 1 },
        '<'
      );

      /* Transition: field first (between screens), then text, then button */
      tl.fromTo(
        dottedWrap,
        { opacity: 0, y: 24 },
        { opacity: 1, y: 0, ease: 'none', duration: 0.55 },
        0.92
      );

      tl.fromTo(revealText,
        { opacity: 0, y: 24 },
        { opacity: 1, y: 0,  ease: 'none', duration: 0.42 },
        1.38
      );

      tl.fromTo(revealBtn,
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0,  ease: 'none', duration: 0.42 },
        1.72
      );

      /* Hold pad — keeps pin alive through the end of 300% scroll */
      tl.to({}, { duration: 0.7 }, 2.3);

      ScrollTrigger.refresh();

      window.addEventListener('beforeunload', function () {
        if (dottedSurface) dottedSurface.destroy();
      });
    });
  </script>
  </body>
</html>
